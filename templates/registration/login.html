{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="display-6 text-center mb-5">Вход в аккаунт</h1>
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="username" class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-lg px-5">Войти</button>
                    </div>
                    <p class="text-center mt-3">Нет аккаунта? <a href="{% url 'shop:register' %}">Зарегистрироваться</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
