{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="display-6 text-center mb-5">Регистрация</h1>
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}  <!-- Или стилизуйте поля вручную как в login -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-success btn-lg px-5">Зарегистрироваться</button>
                    </div>
                    <p class="text-center mt-3">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
