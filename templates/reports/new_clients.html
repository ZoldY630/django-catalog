{% extends "base.html" %}
{% block title %}Новые клиенты{% endblock %}

{% block content %}
<h1>Новые клиенты</h1>
<form method="get">
    <input type="date" name="start" value="{{ start }}">
    <input type="date" name="end" value="{{ end }}">
    <button type="submit">Фильтр</button>
</form>
<p>Новых пользователей: {{ new_users }}</p>
<p>С первым заказом: {{ first_orders }}</p>
{% endblock %}
